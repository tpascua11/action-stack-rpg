<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Choose Your Class — Declared Tactics</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@200;300;400;500;600&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <style>
    /* ════════════════════════════════════════════════════════════════ */
    /* CSS CUSTOM PROPERTIES (Design Tokens) */
    /* ════════════════════════════════════════════════════════════════ */
    :root {
      --color-bg: #080812;
      --color-text: #e8dcc8;
      --color-text-light: #f0e6d3;
      --color-accent-gold: #c9a86a;
      --color-accent-bright: #e8c56d;
      --color-accent-glow: rgba(232, 197, 109, 0.4);
      --color-muted: #9b8bab;
      --color-muted-text: #c8baba;
      --color-footer: #6b6070;
      
      --font-display: 'Bebas Neue', sans-serif;
      --font-body: 'Barlow Condensed', sans-serif;
      --font-mono: 'Share Tech Mono', monospace;
      
      --spacing-xs: 4px;
      --spacing-sm: 8px;
      --spacing-md: 12px;
      --spacing-lg: 20px;
      --spacing-xl: 32px;
      
      --radius-sm: 4px;
      --radius-md: 6px;
      
      --transition-fast: 0.2s ease;
      --transition-base: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      --transition-slow: 0.5s ease;
    }

    /* ── RESET & BASE ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      background: var(--color-bg);
      color: var(--color-text);
      font-family: var(--font-body);
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* ════════════════════════════════════════════════════════════════ */
    /* ATMOSPHERIC LAYERS (Optimized - Single pseudo-element) */
    /* ════════════════════════════════════════════════════════════════ */
    .atmosphere {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9999;
      background: 
        repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px),
        radial-gradient(ellipse at center, transparent 40%, rgba(8, 8, 18, 0.92) 100%),
        linear-gradient(to bottom, rgba(30,20,50,0.12) 0%, transparent 35%, transparent 65%, rgba(15,10,30,0.18) 100%),
        linear-gradient(to right, rgba(40,20,60,0.06) 0%, transparent 30%, transparent 70%, rgba(30,15,50,0.08) 100%);
      opacity: 0.35;
    }

    /* ════════════════════════════════════════════════════════════════ */
    /* CORNER ORNAMENTS (Using ::before/::after for fewer elements) */
    /* ════════════════════════════════════════════════════════════════ */
    .corners {
      position: fixed;
      inset: 28px;
      pointer-events: none;
      z-index: 100;
    }

    .corners::before,
    .corners::after {
      content: '';
      position: absolute;
      width: 24px;
      height: 24px;
      opacity: 0.28;
    }

    .corners::before {
      top: 0; left: 0;
      border-top: 1px solid var(--color-accent-gold);
      border-left: 1px solid var(--color-accent-gold);
    }

    .corners::after {
      top: 0; right: 0;
      border-top: 1px solid var(--color-accent-gold);
      border-right: 1px solid var(--color-accent-gold);
    }

    .corners-bottom {
      position: fixed;
      inset: 28px;
      pointer-events: none;
      z-index: 100;
    }

    .corners-bottom::before,
    .corners-bottom::after {
      content: '';
      position: absolute;
      width: 24px;
      height: 24px;
      opacity: 0.28;
      bottom: 0;
    }

    .corners-bottom::before {
      left: 0;
      border-bottom: 1px solid var(--color-accent-gold);
      border-left: 1px solid var(--color-accent-gold);
    }

    .corners-bottom::after {
      right: 0;
      border-bottom: 1px solid var(--color-accent-gold);
      border-right: 1px solid var(--color-accent-gold);
    }

    /* ════════════════════════════════════════════════════════════════ */
    /* HEADER SECTION */
    /* ════════════════════════════════════════════════════════════════ */
    .header {
      flex: 0 0 auto;
      text-align: center;
      padding: var(--spacing-xl) 20px var(--spacing-sm);
      position: relative;
      z-index: 10;
    }

    .page-title {
      font-family: var(--font-display);
      font-size: clamp(22px, 3vw, 38px);
      font-weight: 400;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--color-text-light);
      margin-bottom: var(--spacing-sm);
      text-shadow: 0 0 40px var(--color-accent-glow), 0 0 80px rgba(212, 168, 75, 0.25);
      animation: fadeInDown 0.8s ease both;
    }

    .page-subtitle {
      font-family: var(--font-body);
      font-size: clamp(9px, 1.2vw, 12px);
      font-weight: 300;
      letter-spacing: 0.5em;
      text-transform: uppercase;
      color: var(--color-muted);
      opacity: 0.75;
      animation: fadeInDown 0.8s ease 0.15s both;
    }

    .header-divider {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--spacing-md);
      margin-top: 14px;
      opacity: 0.4;
      animation: fadeInDown 0.8s ease 0.2s both;
    }

    .divider-line {
      width: 80px;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--color-accent-gold), transparent);
    }

    .divider-diamond {
      width: 5px;
      height: 5px;
      background: var(--color-accent-bright);
      transform: rotate(45deg);
      box-shadow: 0 0 8px var(--color-accent-glow);
    }

    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-15px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ════════════════════════════════════════════════════════════════ */
    /* MAIN LAYOUT CONTAINER */
    /* ════════════════════════════════════════════════════════════════ */
    .character-selection-container {
      flex: 1 1 auto;
      display: flex;
      flex-direction: column;
      gap: var(--spacing-md);
      padding: var(--spacing-sm) 32px 16px;
      position: relative;
      z-index: 10;
      overflow: hidden;
    }

    .selection-layout {
      flex: 1 1 auto;
      display: flex;
      gap: var(--spacing-lg);
      min-height: 0;
    }

    /* ════════════════════════════════════════════════════════════════ */
    /* SIDE PANELS (Left & Right) */
    /* ════════════════════════════════════════════════════════════════ */
    .side-panel {
      flex: 0 0 34%;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      overflow-y: auto;
      overflow-x: hidden;
      padding-right: 4px;
      align-content: start;
    }

    .side-panel::-webkit-scrollbar { width: 4px; }
    .side-panel::-webkit-scrollbar-track { 
      background: rgba(201, 168, 106, 0.05); 
      border-radius: 2px; 
    }
    .side-panel::-webkit-scrollbar-thumb { 
      background: rgba(201, 168, 106, 0.2); 
      border-radius: 2px; 
    }
    .side-panel::-webkit-scrollbar-thumb:hover { 
      background: rgba(201, 168, 106, 0.35); 
    }

    .side-panel.right-panel {
      direction: rtl;
    }

    .side-panel.right-panel > * {
      direction: ltr;
    }

    /* ════════════════════════════════════════════════════════════════ */
    /* CENTER SHOWCASE PANEL */
    /* ════════════════════════════════════════════════════════════════ */
    .center-showcase {
      flex: 1 1 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      background: rgba(15, 12, 25, 0.5);
      border: 1px solid rgba(201, 168, 106, 0.15);
      border-radius: var(--radius-md);
      padding: 20px;
      backdrop-filter: blur(8px);
      position: relative;
      overflow: hidden;
    }

    .center-showcase::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(var(--showcase-accent, 212, 168, 75), 0.06) 0%, transparent 50%);
      pointer-events: none;
      transition: background var(--transition-slow);
    }

    .showcase-portrait {
      width: 100%;
      max-width: 280px;
      aspect-ratio: 2 / 3;
      position: relative;
      background: linear-gradient(
        135deg,
        rgba(var(--showcase-bg-start, 45, 20, 25), 1) 0%,
        rgba(var(--showcase-bg-end, 30, 15, 20), 1) 100%
      );
      border-radius: var(--radius-md);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 
        0 10px 40px rgba(0, 0, 0, 0.4),
        0 0 30px rgba(var(--showcase-accent, 212, 168, 75), 0.15);
      transition: all var(--transition-slow);
      z-index: 2;
      will-change: transform, opacity;
    }

    .large-portrait-placeholder {
      font-size: clamp(70px, 12vw, 140px);
      opacity: 0.25;
      filter: drop-shadow(0 0 40px rgba(var(--showcase-accent, 212, 168, 75), 0.4));
      transition: all var(--transition-slow);
      will-change: transform, opacity;
    }

    .showcase-info {
      text-align: center;
      position: relative;
      z-index: 2;
      max-width: 100%;
    }

    .showcase-name {
      font-family: var(--font-display);
      font-size: clamp(19px, 2.5vw, 32px);
      font-weight: 400;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--color-text-light);
      text-shadow: 0 0 30px rgba(var(--showcase-accent, 212, 168, 75), 0.4);
      transition: all 0.4s ease;
      margin-bottom: 4px;
    }

    .showcase-class {
      font-family: var(--font-mono);
      font-size: clamp(8px, 1.2vw, 11px);
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: rgba(var(--showcase-accent, 212, 168, 75), 0.85);
      opacity: 0.9;
      transition: all 0.4s ease;
      margin-bottom: 14px;
    }

    .showcase-description {
      font-family: var(--font-body);
      font-size: clamp(9px, 1.4vw, 13px);
      font-weight: 300;
      line-height: 1.6;
      color: var(--color-muted-text);
      letter-spacing: 0.02em;
      max-width: 380px;
      margin: 0 auto;
      transition: opacity var(--transition-fast);
    }

    /* ════════════════════════════════════════════════════════════════ */
    /* CHARACTER CARD COMPONENT */
    /* ════════════════════════════════════════════════════════════════ */
    .character-card {
      width: 100%;
      aspect-ratio: 1 / 1;
      background: rgba(15, 12, 25, 0.7);
      border: 1px solid rgba(201, 168, 106, 0.2);
      border-radius: var(--radius-md);
      overflow: hidden;
      cursor: pointer;
      transition: all var(--transition-base);
      position: relative;
      backdrop-filter: blur(10px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 8px;
      animation: cardFadeIn 0.5s ease both;
      will-change: transform, box-shadow;
    }

    /* Staggered animation delays using nth-child pattern */
    .character-card:nth-child(n) { animation-delay: calc(0.05s + (0.03s * (var(--card-index, 0)))); }

    @keyframes cardFadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .character-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        135deg,
        rgba(var(--card-accent), 0.08) 0%,
        transparent 50%,
        rgba(var(--card-accent), 0.04) 100%
      );
      opacity: 0;
      transition: opacity 0.35s ease;
      pointer-events: none;
      z-index: 1;
    }

    .character-card:hover,
    .character-card.selected {
      transform: scale(1.06);
      border-color: rgba(var(--card-accent), 0.65);
      box-shadow: 
        0 8px 32px rgba(0, 0, 0, 0.5),
        0 0 24px rgba(var(--card-accent), 0.22);
      z-index: 5;
    }

    .character-card.selected {
      border-color: rgba(var(--card-accent), 0.9);
      background: rgba(var(--card-accent), 0.15);
      box-shadow: 
        0 8px 32px rgba(0, 0, 0, 0.55),
        0 0 35px rgba(var(--card-accent), 0.3);
    }

    .character-card:hover::before {
      opacity: 1;
    }

    .portrait-container {
      display: flex;
      width: 48px;
      height: 48px;
      position: relative;
      background: linear-gradient(
        135deg,
        rgba(var(--card-bg-start), 1) 0%,
        rgba(var(--card-bg-end), 1) 100%
      );
      border-radius: 50%;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .portrait-placeholder {
      font-size: 24px;
      opacity: 0.35;
      filter: drop-shadow(0 0 8px rgba(var(--card-accent), 0.3));
      transition: all var(--transition-base);
    }

    .character-card:hover .portrait-placeholder {
      opacity: 0.55;
      transform: scale(1.15);
      filter: drop-shadow(0 0 14px rgba(var(--card-accent), 0.45));
    }

    .character-label {
      position: relative;
      z-index: 2;
      width: 100%;
      text-align: center;
    }

    .character-name {
      font-family: var(--font-display);
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--color-text-light);
      text-shadow: 0 0 8px rgba(var(--card-accent), 0.2);
      transition: all var(--transition-base);
      line-height: 1.1;
    }

    .character-card:hover .character-name,
    .character-card.selected .character-name {
      color: #ffffff;
      text-shadow: 0 0 12px rgba(var(--card-accent), 0.5);
    }

    .select-indicator {
      position: absolute;
      inset: 0;
      border: 2px solid rgba(var(--card-accent), 0.7);
      border-radius: var(--radius-md);
      opacity: 0;
      transition: all var(--transition-base);
      z-index: 3;
      pointer-events: none;
    }

    .character-card:hover .select-indicator,
    .character-card.selected .select-indicator {
      opacity: 1;
      box-shadow:
        inset 0 0 20px rgba(var(--card-accent), 0.15),
        0 0 20px rgba(var(--card-accent), 0.3);
    }

    /* Character Color Themes (Consolidated) */
    .character-card[data-character="samurai"]    { --card-accent: 200, 80, 80;   --card-bg-start: 45, 20, 25; --card-bg-end: 30, 15, 20; }
    .character-card[data-character="warrior"]    { --card-accent: 130, 150, 180; --card-bg-start: 25, 30, 40; --card-bg-end: 18, 22, 32; }
    .character-card[data-character="fighter"]    { --card-accent: 210, 140, 80;  --card-bg-start: 40, 28, 18; --card-bg-end: 30, 20, 14; }
    .character-card[data-character="monk"]       { --card-accent: 100, 170, 130; --card-bg-start: 20, 35, 28; --card-bg-end: 15, 26, 20; }
    .character-card[data-character="rogue"]      { --card-accent: 155, 120, 185; --card-bg-start: 30, 22, 38; --card-bg-end: 22, 16, 30; }
    .character-card[data-character="templar"]    { --card-accent: 220, 185, 110; --card-bg-start: 35, 30, 18; --card-bg-end: 26, 22, 14; }
    .character-card[data-character="paladin"]    { --card-accent: 190, 210, 235; --card-bg-start: 28, 32, 42; --card-bg-end: 20, 24, 32; }
    .character-card[data-character="wizard"]     { --card-accent: 160, 130, 220; --card-bg-start: 32, 24, 42; --card-bg-end: 24, 18, 32; }

    /* ════════════════════════════════════════════════════════════════ */
    /* EMPTY SLOT PLACEHOLDERS */
    /* ════════════════════════════════════════════════════════════════ */
    .empty-slot {
      aspect-ratio: 1 / 1;
      background: rgba(15, 12, 25, 0.25);
      border: 1px dashed rgba(201, 168, 106, 0.15);
      border-radius: var(--radius-md);
      position: relative;
      opacity: 0.4;
    }

    .empty-slot::after {
      content: '?';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-family: var(--font-display);
      font-size: 20px;
      color: rgba(201, 168, 106, 0.2);
    }

    /* ════════════════════════════════════════════════════════════════ */
    /* START BUTTON */
    /* ════════════════════════════════════════════════════════════════ */
    .start-button {
      position: relative;
      background: linear-gradient(135deg, rgba(212, 168, 75, 0.15), rgba(180, 140, 60, 0.08));
      border: 1px solid rgba(232, 197, 109, 0.4);
      border-radius: var(--radius-sm);
      cursor: pointer;
      padding: 10px 40px;
      font-family: var(--font-display);
      font-size: 20px;
      font-weight: 400;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--color-accent-bright);
      text-shadow: 0 0 20px rgba(232, 197, 109, 0.3);
      transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 5;
      overflow: hidden;
      margin-top: auto;
      will-change: transform, box-shadow;
    }

    .start-button:hover {
      background: linear-gradient(135deg, rgba(232, 197, 109, 0.25), rgba(200, 165, 85, 0.15));
      border-color: rgba(232, 197, 109, 0.7);
      color: #ffffff;
      text-shadow:
        0 0 30px rgba(255, 235, 180, 0.6),
        0 0 60px rgba(232, 197, 109, 0.4);
      transform: scale(1.05);
      box-shadow:
        0 0 25px rgba(232, 197, 109, 0.3),
        0 0 50px rgba(232, 197, 109, 0.15);
    }

    .start-button:active {
      transform: scale(0.98);
    }

    .start-button:focus-visible {
      outline: 2px solid var(--color-accent-bright);
      outline-offset: 2px;
    }

    .start-glow {
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
      transform: translateX(-100%);
      transition: transform 0.6s ease;
    }

    .start-button:hover .start-glow {
      transform: translateX(100%);
    }

    .start-text {
      position: relative;
      z-index: 2;
    }

    /* ════════════════════════════════════════════════════════════════ */
    /* FOOTER */
    /* ════════════════════════════════════════════════════════════════ */
    .footer {
      flex: 0 0 auto;
      display: flex;
      justify-content: center;
      gap: 36px;
      padding: 12px 20px 24px;
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.2em;
      color: var(--color-footer);
      text-transform: uppercase;
      z-index: 100;
      opacity: 0.6;
      position: relative;
    }

    /* ════════════════════════════════════════════════════════════════ */
    /* RESPONSIVE DESIGN (Streamlined with clamp() and fewer breakpoints) */
    /* ════════════════════════════════════════════════════════════════ */
    
    @media (max-width: 1200px) {
      .side-panel { flex: 0 0 31%; gap: 7px; }
      .center-showcase { padding: 16px; gap: 12px; }
      .portrait-container { width: 44px; height: 44px; }
      .character-name { font-size: 12px; }
    }

    @media (max-width: 850px) {
      .selection-layout {
        flex-direction: column;
        gap: 10px;
      }
      
      .side-panel {
        flex: 1 1 auto;
        grid-template-columns: repeat(5, 1fr);
        gap: 8px;
        padding-right: 2px;
      }
      
      .center-showcase {
        order: -1;
        flex-direction: row;
        gap: 20px;
        padding: 14px 20px;
      }
      
      .showcase-portrait {
        max-width: 160px;
        flex: 0 0 auto;
      }
      
      .showcase-info {
        text-align: left;
        flex: 1 1 auto;
      }
      
      .large-portrait-placeholder {
        font-size: clamp(60px, 15vw, 90px);
      }
    }

    @media (max-width: 600px) {
      .header { padding: 20px 14px 8px; }
      .character-selection-container { padding: 6px 14px 10px; gap: 6px; }
      .side-panel { grid-template-columns: repeat(4, 1fr); gap: 6px; }
      .portrait-container { width: 36px; height: 36px; }
      .portrait-placeholder { font-size: 18px; }
      .character-name { font-size: 10px; }
      .center-showcase { padding: 12px 14px; gap: 14px; }
      .showcase-portrait { max-width: 130px; }
    }

    @media (max-width: 480px) {
      .header { padding: 18px 12px 6px; }
      .page-title { letter-spacing: 0.18em; }
      .page-subtitle { font-size: 9px; }
      .character-selection-container { padding: 4px 10px 8px; gap: 5px; }
      .side-panel { grid-template-columns: repeat(3, 1fr); gap: 5px; }
      .portrait-container { width: 32px; height: 32px; }
      .portrait-placeholder { font-size: 16px; }
      .character-name { font-size: 9px; }
      .center-showcase { padding: 10px 12px; gap: 10px; }
      .showcase-portrait { max-width: 110px; }
      .large-portrait-placeholder { font-size: clamp(45px, 12vw, 70px); }
      .showcase-name { letter-spacing: 0.15em; }
      .showcase-class { letter-spacing: 0.2em; }
    }

    /* Reduced motion preference */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>

  <!-- Visual Layers (Consolidated) -->
  <div class="atmosphere"></div>

  <!-- Corner Ornaments (Reduced from 4 elements to 2) -->
  <div class="corners"></div>
  <div class="corners-bottom"></div>

  <!-- Header -->
  <header class="header">
    <h1 class="page-title">Choose Your Class</h1>
    <p class="page-subtitle">Select Your Path</p>
    <div class="header-divider">
      <div class="divider-line"></div>
      <div class="divider-diamond"></div>
      <div class="divider-line"></div>
    </div>
  </header>

  <!-- Character Selection Container -->
  <main class="character-selection-container">
    
    <div class="selection-layout">
      
      <!-- LEFT PANEL -->
      <aside class="side-panel left-panel" id="leftPanel">
        <article class="character-card" data-character="samurai">
          <div class="select-indicator"></div>
          <div class="portrait-container">
            <div class="portrait-placeholder">⚔️</div>
          </div>
          <div class="character-label">
            <span class="character-name">Samurai</span>
          </div>
        </article>

        <article class="character-card" data-character="warrior">
          <div class="select-indicator"></div>
          <div class="portrait-container">
            <div class="portrait-placeholder">🛡️</div>
          </div>
          <div class="character-label">
            <span class="character-name">Warrior</span>
          </div>
        </article>

        <article class="character-card" data-character="fighter">
          <div class="select-indicator"></div>
          <div class="portrait-container">
            <div class="portrait-placeholder">💪</div>
          </div>
          <div class="character-label">
            <span class="character-name">Fighter</span>
          </div>
        </article>

        <article class="character-card" data-character="monk">
          <div class="select-indicator"></div>
          <div class="portrait-container">
            <div class="portrait-placeholder">🤜</div>
          </div>
          <div class="character-label">
            <span class="character-name">Monk</span>
          </div>
        </article>

        <div class="empty-slot"></div>
        <div class="empty-slot"></div>
        <div class="empty-slot"></div>
      </aside>

      <!-- CENTER SHOWCASE -->
      <section class="center-showcase" id="centerShowcase">
        <div class="showcase-portrait" id="showcasePortrait">
          <div class="large-portrait-placeholder" id="largePortraitPlaceholder">⚔️</div>
        </div>
        <div class="showcase-info">
          <h2 class="showcase-name" id="showcaseName">Samurai</h2>
          <p class="showcase-class" id="showcaseClass">Way of the Blade</p>
          <p class="showcase-description" id="showcaseDescription">
            Bound by honor and Bushido, these warriors walk the path of perfect discipline.
          </p>
        </div>
        <button class="start-button" id="startButton" type="button">
          <span class="start-text">START</span>
          <span class="start-glow"></span>
        </button>
      </section>

      <!-- RIGHT PANEL -->
      <aside class="side-panel right-panel" id="rightPanel">
        
        <article class="character-card" data-character="rogue">
          <div class="select-indicator"></div>
          <div class="portrait-container">
            <div class="portrait-placeholder">🗡️</div>
          </div>
          <div class="character-label">
            <span class="character-name">Rogue</span>
          </div>
        </article>

        <article class="character-card" data-character="templar">
          <div class="select-indicator"></div>
          <div class="portrait-container">
            <div class="portrait-placeholder">✝️</div>
          </div>
          <div class="character-label">
            <span class="character-name">Templar</span>
          </div>
        </article>

        <article class="character-card" data-character="paladin">
          <div class="select-indicator"></div>
          <div class="portrait-container">
            <div class="portrait-placeholder">⚜️</div>
          </div>
          <div class="character-label">
            <span class="character-name">Paladin</span>
          </div>
        </article>

        <article class="character-card" data-character="wizard">
          <div class="select-indicator"></div>
          <div class="portrait-container">
            <div class="portrait-placeholder">🔮</div>
          </div>
          <div class="character-label">
            <span class="character-name">Wizard</span>
          </div>
        </article>

        <div class="empty-slot"></div>
        <div class="empty-slot"></div>
        <div class="empty-slot"></div>
        <div class="empty-slot"></div>
      </aside>
      
    </div>
    
  </main>

  <!-- Footer -->
  <footer class="footer">
    <span>Declared Tactics</span>
    <span>Avormore</span>
  </footer>

  <script>
    // ════════════════════════════════════════════════════════════════
    // CHARACTER DATA (Single source of truth)
    // ════════════════════════════════════════════════════════════════
    const CHARACTER_DATA = {
      samurai: {
        name: 'Samurai',
        classTitle: 'Way of the Blade',
        icon: '⚔️',
        bgStart: '45, 20, 25',
        bgEnd: '30, 15, 20',
        description: 'Bound by honor and the ancient code of Bushido, these warriors walk the path of perfect discipline. Their steel sings with the weight of generations—each strike a meditation, each victory a testament to unwavering resolve.',
        accent: '200, 80, 80'
      },
      warrior: {
        name: 'Warrior',
        classTitle: 'Master of Arms',
        icon: '🛡️',
        bgStart: '25, 30, 40',
        bgEnd: '18, 22, 32',
        description: 'Forged in countless battles, the Warrior stands as an unbreakable wall between allies and annihilation. No tactic too simple, no enemy too formidable—they face the tide of war with raw strength and indomitable will.',
        accent: '130, 150, 180'
      },
      fighter: {
        name: 'Fighter',
        classTitle: 'Versatile Combatant',
        icon: '💪',
        bgStart: '40, 28, 18',
        bgEnd: '30, 20, 14',
        description: 'Adaptable, relentless, unpredictable—the Fighter masters no single style but excels in all. From tavern brawls to duels of honor, they write their legend in sweat, blood, and the scars of a hundred different disciplines.',
        accent: '210, 140, 80'
      },
      monk: {
        name: 'Monk',
        classTitle: 'Disciple of Spirit',
        icon: '🤜',
        bgStart: '20, 35, 28',
        bgEnd: '15, 26, 20',
        description: 'Through years of meditation and physical perfection, Monks channel inner energy into devastating force. They need no weapon—their body is the instrument, their mind the forge where flesh and spirit become one.',
        accent: '100, 170, 130'
      },
      rogue: {
        name: 'Rogue',
        classTitle: 'Shadow Walker',
        icon: '🗡️',
        bgStart: '30, 22, 38',
        bgEnd: '22, 16, 30',
        description: 'In the spaces between light and darkness, Rogues find their truth. Masters of misdirection and precision strikes, they turn the battlefield into a dance where only they know the steps—and the blade always finds its mark.',
        accent: '155, 120, 185'
      },
      templar: {
        name: 'Templar',
        classTitle: 'Holy Enforcer',
        icon: '✝️',
        bgStart: '35, 30, 18',
        bgEnd: '26, 22, 14',
        description: 'Sworn to sacred duty, Templars blend martial prowess with divine authority. They are the sword arm of faith itself—judging, purging, and protecting with the weight of conviction that burns brighter than any earthly fire.',
        accent: '220, 185, 110'
      },
      paladin: {
        name: 'Paladin',
        classTitle: 'Beacon of Light',
        icon: '⚜️',
        bgStart: '28, 32, 42',
        bgEnd: '20, 24, 32',
        description: 'Radiating hope in the darkest hours, Paladins stand as living embodiments of courage and compassion. Their oath is their strength—shielding the innocent, smiting the wicked, and inspiring all who witness their luminous example.',
        accent: '190, 210, 235'
      },
      wizard: {
        name: 'Wizard',
        classTitle: 'Arcane Scholar',
        icon: '🔮',
        bgStart: '32, 24, 42',
        bgEnd: '24, 18, 32',
        description: 'Keepers of forbidden knowledge and weavers of reality itself, Wizards perceive the threads of magic that bind all existence. With gesture and word, they reshape the impossible—scholars whose curiosity rivals the stars themselves.',
        accent: '160, 130, 220'
      }
    };

    // ════════════════════════════════════════════════════════════════
    // APPLICATION STATE
    // ════════════════════════════════════════════════════════════════
    const state = {
      selectedCharacter: 'samurai',
      isTransitioning: false
    };

    // ════════════════════════════════════════════════════════════════
    // DOM CACHE (Query once, reuse everywhere)
    // ════════════════════════════════════════════════════════════════
    const dom = {
      showcase: null,
      portraitEl: null,
      nameEl: null,
      classEl: null,
      descEl: null,
      cards: null,
      startButton: null
    };

    // ════════════════════════════════════════════════════════════════
    // INITIALIZATION
    // ════════════════════════════════════════════════════════════════
    function init() {
      // Cache DOM elements
      dom.showcase = document.getElementById('centerShowcase');
      dom.portraitEl = document.getElementById('largePortraitPlaceholder');
      dom.nameEl = document.getElementById('showcaseName');
      dom.classEl = document.getElementById('showcaseClass');
      dom.descEl = document.getElementById('showcaseDescription');
      dom.cards = document.querySelectorAll('.character-card');
      dom.startButton = document.getElementById('startButton');

      // Set card indices for staggered animation
      dom.cards.forEach((card, index) => {
        card.style.setProperty('--card-index', index);
      });

      // Event delegation for character cards (single listener vs 8 inline handlers)
      document.querySelectorAll('.side-panel').forEach(panel => {
        panel.addEventListener('click', handleCardClick);
        panel.addEventListener('mouseenter', handleCardHover, true);
      });

      // Start button event
      dom.startButton.addEventListener('click', handleStartGame);

      // Initialize with default selection
      selectCharacter(state.selectedCharacter);
    }

    // ════════════════════════════════════════════════════════════════
    // EVENT HANDLERS (Delegated)
    // ════════════════════════════════════════════════════════════════
    function handleCardClick(e) {
      const card = e.target.closest('.character-card');
      if (!card) return;

      const characterId = card.dataset.character;
      if (characterId && characterId !== state.selectedCharacter) {
        selectCharacter(characterId);
      }
    }

    function handleCardHover(e) {
      const card = e.target.closest('.character-card');
      if (!card || state.isTransitioning) return;

      const characterId = card.dataset.character;
      if (characterId && characterId !== state.selectedCharacter) {
        showDescription(characterId);
      }
    }

    function handleStartGame() {
      const btn = dom.startButton;
      
      // Button press animation
      btn.style.transform = 'scale(0.95)';
      btn.style.boxShadow = '0 0 30px rgba(232, 197, 109, 0.5)';
      
      requestAnimationFrame(() => {
        setTimeout(() => {
          btn.style.transform = 'scale(1)';
          
          console.log(`Starting game as: ${state.selectedCharacter}`);
          
          // Visual feedback
          btn.style.background = 'linear-gradient(135deg, rgba(232, 197, 109, 0.4), rgba(200, 165, 85, 0.25))';
          btn.style.borderColor = '#e8c56d';
          btn.style.color = '#ffffff';
          
          setTimeout(() => {
            btn.style.background = '';
            btn.style.borderColor = '';
            btn.style.color = '';
          }, 300);
        }, 100);
      });
    }

    // ════════════════════════════════════════════════════════════════
    // CORE FUNCTIONS
    // ════════════════════════════════════════════════════════════════
    function selectCharacter(characterId) {
      // Update selection state
      state.selectedCharacter = characterId;
      
      // Update UI classes (batch DOM operation)
      dom.cards.forEach(card => {
        card.classList.toggle('selected', card.dataset.character === characterId);
      });

      // Update showcase
      showDescription(characterId);
    }

    function showDescription(characterId) {
      const data = CHARACTER_DATA[characterId];
      if (!data || state.isTransitioning) return;

      state.isTransitioning = true;

      // Fade out (using CSS transitions)
      const fadeElements = [dom.portraitEl, dom.nameEl, dom.classEl, dom.descEl];
      fadeElements.forEach(el => {
        el.style.opacity = '0';
        el.style.transform = el === dom.portraitEl ? 'scale(0.95)' : 'translateY(5px)';
      });

      // Use requestAnimationFrame for smoother timing
      requestAnimationFrame(() => {
        setTimeout(() => {
          // Batch all DOM updates together (reflow happens once)
          dom.portraitEl.textContent = data.icon;
          dom.showcase.style.setProperty('--showcase-accent', data.accent);
          dom.showcase.style.setProperty('--showcase-bg-start', data.bgStart);
          dom.showcase.style.setProperty('--showcase-bg-end', data.bgEnd);
          dom.nameEl.textContent = data.name;
          dom.classEl.textContent = data.classTitle;
          dom.descEl.textContent = data.description;

          // Fade in
          requestAnimationFrame(() => {
            fadeElements.forEach(el => {
              el.style.opacity = '1';
              el.style.transform = el === dom.portraitEl ? 'scale(1)' : 'translateY(0)';
            });
            
            state.isTransitioning = false;
          });
        }, 150);
      });
    }

    // ════════════════════════════════════════════════════════════════
    // BOOTSTRAP
    // ════════════════════════════════════════════════════════════════
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  </script>

</body>
</html>
